configuration:
  api_uri:
    name: API URI
    description: Public URL TRMNL devices use to reach this Terminus server.
  rack_attack_allowed_subnets:
    name: Allowed Subnets
    description: Comma-separated IP addresses or subnets allowed through Terminus rate-limit protection.
  certificate_urls:
    name: Certificate URLs
    description: Optional comma-separated custom CA certificate URLs for outbound HTTPS calls.
network:
  2300/tcp: Terminus web interface and TRMNL device API
